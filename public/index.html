<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Tienda - E-commerce</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; }
        header { background: #333; color: #fff; padding: 1rem; display: flex; justify-content: space-between; align-items: center; }
        header h1 { margin: 0; }
        nav a { color: #fff; text-decoration: none; margin-left: 1rem; padding: 0.5rem 1rem; border-radius: 4px; }
        nav a:hover { background: #555; }
        .btn-login { background: #007bff; }
        .btn-register { background: #28a745; }
        .btn-admin { background: #ffc107; color: #333; }
        .btn-logout { background: #dc3545; }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
        .filters { margin-bottom: 2rem; display: flex; gap: 1rem; align-items: center; }
        .filters select { padding: 0.5rem; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
        .product-card { background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); transition: transform 0.2s; }
        .product-card:hover { transform: translateY(-4px); }
        .product-card img { width: 100%; height: 200px; object-fit: cover; background: #eee; }
        .product-card .info { padding: 1rem; }
        .product-card h3 { margin-bottom: 0.5rem; color: #333; }
        .product-card .price { font-size: 1.3rem; font-weight: bold; color: #007bff; }
        .product-card .category { color: #666; font-size: 0.9rem; margin-top: 0.5rem; }
        .product-card .description { color: #666; font-size: 0.9rem; margin-top: 0.5rem; }
        .loading { text-align: center; padding: 2rem; font-size: 1.2rem; color: #666; }
        .user-info { display: flex; align-items: center; gap: 0.5rem; }
        .user-info span { color: #fff; }
    </style>
</head>
<body>
    <header>
        <h1>Mi Tienda</h1>
        <div>
            <div id="userInfo" class="user-info" style="display:none">
                <span id="userName"></span>
                <a href="/admin.html" id="adminLink" class="btn-admin" style="display:none">Admin</a>
                <a href="#" id="logoutBtn" class="btn-logout">Cerrar Sesion</a>
            </div>
            <nav id="authLinks">
                <a href="/login.html" class="btn-login">Iniciar Sesion</a>
                <a href="/register.html" class="btn-register">Registrarse</a>
            </nav>
        </div>
    </header>

    <div class="container">
        <h2>Productos</h2>
        <div class="filters">
            <label for="categoryFilter">Filtrar por categoria:</label>
            <select id="categoryFilter">
                <option value="">Todas las categorias</option>
            </select>
        </div>
        <div id="loading" class="loading">Cargando productos...</div>
        <div id="productsContainer" class="products-grid"></div>
    </div>

    <script>
        const API_URL = '/api';
        let currentUser = null;

        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('token');
            const user = localStorage.getItem('user');
            
            if (token && user) {
                currentUser = JSON.parse(user);
                showUserInfo();
            }
            
            await loadCategories();
            await loadProducts();
        });

        function showUserInfo() {
            document.getElementById('userInfo').style.display = 'flex';
            document.getElementById('authLinks').style.display = 'none';
            document.getElementById('userName').textContent = 'Hola, ' + currentUser.nombre;
            
            if (currentUser.role === 'ADMIN') {
                document.getElementById('adminLink').style.display = 'inline-block';
            }
        }

        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.reload();
        });

        async function loadCategories() {
            try {
                const res = await fetch(API_URL + '/categories');
                const data = await res.json();
                if (data.success) {
                    const select = document.getElementById('categoryFilter');
                    data.data.forEach(cat => {
                        const option = document.createElement('option');
                        option.value = cat.id;
                        option.textContent = cat.nombre;
                        select.appendChild(option);
                    });
                }
            } catch (err) {
                console.error('Error al cargar categorias:', err);
            }
        }

        async function loadProducts(categoryId) {
            if (!categoryId) categoryId = '';
            document.getElementById('loading').style.display = 'block';
            document.getElementById('productsContainer').innerHTML = '';
            
            try {
                let url = API_URL + '/products';
                if (categoryId) {
                    url += '?categoryId=' + categoryId;
                }
                
                const res = await fetch(url);
                const data = await res.json();
                
                document.getElementById('loading').style.display = 'none';
                
                if (data.success) {
                    renderProducts(data.data);
                }
            } catch (err) {
                document.getElementById('loading').textContent = 'Error al cargar productos';
                console.error('Error:', err);
            }
        }

        function renderProducts(products) {
            const container = document.getElementById('productsContainer');
            
            if (products.length === 0) {
                container.innerHTML = '<p style="text-align:center;color:#666;">No hay productos disponibles</p>';
                return;
            }
            
            products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                
                const imageUrl = product.imageUrl || 'https://via.placeholder.com/300x200?text=Sin+Imagen';
                const categoryName = product.category ? product.category.nombre : 'Sin categoria';
                const desc = product.descripcion ? product.descripcion.substring(0, 100) + '...' : '';
                
                card.innerHTML = 
                    '<a href="/product.html?id=' + product.id + '" style="text-decoration:none;color:inherit;">' +
                        '<img src="' + imageUrl + '" alt="' + product.nombre + '" onerror="this.src=\'https://via.placeholder.com/300x200?text=Sin+Imagen\'">' +
                        '<div class="info">' +
                            '<h3>' + product.nombre + '</h3>' +
                            '<div class="price">$' + parseFloat(product.precio).toFixed(2) + '</div>' +
                            '<div class="category">' + categoryName + '</div>' +
                            (desc ? '<div class="description">' + desc + '</div>' : '') +
                        '</div>' +
                    '</a>';
                container.appendChild(card);
            });
        }

        document.getElementById('categoryFilter').addEventListener('change', (e) => {
            loadProducts(e.target.value);
        });
    </script>
</body>
</html>
